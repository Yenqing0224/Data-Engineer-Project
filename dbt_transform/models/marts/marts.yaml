version: 2

# Define data quality tests and documentation for the business aggregation layer
models:
  - name: fact_crypto_price
    description: "Marts layer model providing deduplicated daily snapshots and 7-day rolling moving average price trends."

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - coin_id
              - date_time
            
    columns:
      - name: coin_id
        description: "The unique identifier for the cryptocurrency (e.g., bitcoin, ethereum)."
        tests:
          - not_null

      - name: date_time
        description: "Unique daily midnight timestamp acting as the logical primary key."
        tests:
          - not_null

      - name: price
        description: "Final deduplicated daily midnight Bitcoin price in USD."
        tests:
          - not_null

      - name: moving_avg_price_7d
        description: "7-day moving average price calculated using a rolling window of the current row and 6 preceding rows."
        tests:
          - not_null